name: Publish Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync project environment
        run: uv sync --frozen

      - name: Build Sphinx HTML
        env:
          TRAQ_API_KEY: docs-build-key
          TRAQ_DATABASE_URL: "sqlite+pysqlite:///:memory:"
          OPENAI_API_KEY: docs-build-placeholder
          TRAQ_ENABLE_DISCOVERY: "false"
          TRAQ_AUTO_CREATE_SCHEMA: "false"
          TRAQ_ENABLE_FILE_LOGGING: "false"
        run: uv run sphinx-build -E -b html docs docs/_build/html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
