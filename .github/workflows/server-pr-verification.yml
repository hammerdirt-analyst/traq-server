name: Server PR Verification

on:
  pull_request:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/server-pr-verification.yml"
      - ".github/workflows/server-cloudrun.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-deploy-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync server environment
        run: uv sync --frozen

      - name: Run pre-deploy release verification
        env:
          TRAQ_DATABASE_URL: "sqlite+pysqlite:///:memory:"
          TRAQ_ENABLE_DISCOVERY: "false"
          TRAQ_AUTO_CREATE_SCHEMA: "false"
          TRAQ_ENABLE_FILE_LOGGING: "false"
        run: uv run python scripts/release_verify.py pre-deploy
