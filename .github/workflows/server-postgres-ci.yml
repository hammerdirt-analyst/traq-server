name: Server Postgres CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/server-postgres-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: traq_ci
          POSTGRES_PASSWORD: traq_ci
          POSTGRES_DB: traq_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U traq_ci -d traq_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync server environment
        run: uv sync --frozen

      - name: Run Alembic migrations against Postgres
        env:
          TRAQ_DATABASE_URL: "postgresql+psycopg://traq_ci:traq_ci@127.0.0.1:5432/traq_ci"
          TRAQ_ENABLE_DISCOVERY: "false"
          TRAQ_AUTO_CREATE_SCHEMA: "false"
          TRAQ_ENABLE_FILE_LOGGING: "false"
        run: uv run alembic upgrade head

      - name: Run Postgres integration smoke tests
        env:
          TRAQ_DATABASE_URL: "postgresql+psycopg://traq_ci:traq_ci@127.0.0.1:5432/traq_ci"
          TRAQ_ENABLE_DISCOVERY: "false"
          TRAQ_AUTO_CREATE_SCHEMA: "false"
          TRAQ_ENABLE_FILE_LOGGING: "false"
        run: uv run python -m unittest tests.test_postgres_ci_smoke
